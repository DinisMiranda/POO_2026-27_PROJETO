<!doctype html>
<html lang="pt">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenify – Exercícios</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
   href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
   rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/app.css" />
 </head>

 <body data-zenify-page="exercicios">
  <div class="app">
   <aside class="sidebar" data-zenify-sidebar></aside>

   <main class="main">
    <header data-zenify-topbar></header>

    <div class="page-stack">
     <div class="exercises-grid-3" id="exercises-grid"></div>
    </div>
   </main>
  </div>

  <div class="achievement-modal" id="exercise-modal" hidden>
   <div class="achievement-modal-backdrop" data-exercise-close></div>
   <div
    class="achievement-modal-panel exercise-modal-panel"
    role="dialog"
    aria-labelledby="exercise-modal-title"
   >
    <header class="achievement-modal-header">
     <div>
      <h2 id="exercise-modal-title">Exercício</h2>
      <p class="exercise-modal-meta" id="exercise-modal-meta"></p>
     </div>
     <button
      type="button"
      class="achievement-modal-close"
      data-exercise-close
      aria-label="Fechar"
     >
      &times;
     </button>
    </header>

    <div class="achievement-modal-body exercise-modal-body" id="exercise-modal-content"></div>

    <footer class="exercise-modal-footer">
     <button type="button" class="btn-secondary" data-exercise-close>Sair</button>
     <button type="button" class="btn-primary" id="exercise-complete" disabled>
      Concluir exercício
     </button>
    </footer>
   </div>
  </div>

  <div class="achievement-modal exercise-xp-modal" id="exercise-xp-modal" hidden>
   <div class="achievement-modal-backdrop" data-xp-close></div>
   <div
    class="achievement-modal-panel exercise-xp-panel"
    role="dialog"
    aria-labelledby="exercise-xp-title"
    aria-modal="true"
   >
    <div class="exercise-xp-body">
     <div class="exercise-xp-badge" id="exercise-xp-badge" aria-hidden="true">+0 XP</div>
     <h2 id="exercise-xp-title">Exercício concluído!</h2>
     <p class="exercise-xp-subtitle" id="exercise-xp-subtitle"></p>
     <p class="exercise-xp-extra" id="exercise-xp-extra" hidden></p>
     <button type="button" class="btn-primary exercise-xp-btn" data-xp-close>
      Continuar
     </button>
    </div>
   </div>
  </div>

  <div class="feedback-toast" id="exercise-toast"></div>

  <script type="module" src="../js/controllers/exercicios.js"></script>
 </body>
</html>
