<!doctype html>
<html lang="pt-PT">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenify – Diário</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
   href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
   rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/app.css" />
 </head>
 <body data-zenify-page="diario">
  <div class="app">
   <aside class="sidebar" data-zenify-sidebar></aside>

   <main class="main">
    <header data-zenify-topbar></header>

    <div class="page-stack">
     <div class="page-grid-2">
      <div class="card">
       <h3>Registo de hoje</h3>
       <p class="lead">
        Regista como te sentes (1 = muito baixo, 5 = muito bem). Podes atualizar
        a entrada de hoje ao longo do dia.
       </p>

       <form id="mood-form" class="diary-form">
        <div class="field">
         <label>Humor</label>
         <div class="mood-picker" id="mood-picker" role="group" aria-label="Nível de humor">
          <button type="button" class="mood-pick" data-mood="1">1</button>
          <button type="button" class="mood-pick" data-mood="2">2</button>
          <button type="button" class="mood-pick" data-mood="3">3</button>
          <button type="button" class="mood-pick" data-mood="4">4</button>
          <button type="button" class="mood-pick" data-mood="5">5</button>
         </div>
         <p class="diary-mood-hint" id="mood-hint">Escolhe um valor de 1 a 5</p>
        </div>

        <div class="field">
         <label for="mood-note">Nota (opcional)</label>
         <textarea
          id="mood-note"
          name="note"
          placeholder="Ex.: Stress antes da apresentação, mas respirei fundo."
          maxlength="500"
         ></textarea>
        </div>

        <button type="submit" class="btn-primary" id="mood-submit" disabled>
         Guardar registo
        </button>
       </form>

       <p id="diary-feedback" class="diary-feedback" role="status" aria-live="polite"></p>
      </div>

      <div class="card">
       <h3>Sugestão Zenify</h3>
       <p class="lead" id="recommendation-text">
        Regista o teu humor para receberes uma sugestão personalizada.
       </p>
       <p class="diary-rule" id="recommendation-rule"></p>
      </div>
     </div>

     <div class="card">
      <h3>Histórico recente</h3>
      <ul class="list-rows" id="mood-history"></ul>
     </div>
    </div>
   </main>
  </div>

  <script type="module" src="../js/views/sidebar-view.js"></script>
  <script type="module" src="../js/views/topbar-view.js"></script>
  <script type="module" src="../js/controllers/diario.js"></script>
 </body>
</html>
