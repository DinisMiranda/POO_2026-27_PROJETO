<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenify | Admin</title>
    <link rel="stylesheet" href="src/css/a11y.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <a class="skip-link" href="#conteudo-principal">Saltar para o conteudo</a>
    <header class="bg-white shadow-sm">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4" aria-label="Painel de administracao">
        <a class="text-xl font-bold text-indigo-800" href="index.html">Zenify</a>
        <div class="flex items-center gap-3">
          <span id="userLabel" class="text-sm text-slate-700" aria-live="polite"></span>
          <button id="logoutBtn" class="rounded-md border border-slate-400 px-4 py-2" type="button" aria-label="Terminar sessao">
            Logout
          </button>
        </div>
      </nav>
    </header>

    <main id="conteudo-principal" class="mx-auto max-w-5xl space-y-6 px-6 py-8" role="main">
      <section class="rounded-xl bg-white p-4 shadow" aria-label="Navegacao do admin">
        <div class="flex flex-wrap gap-2" role="tablist" aria-label="Secoes do painel">
          <button
            type="button"
            data-view-target="activities"
            aria-selected="true"
            class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium"
          >
            Atividades
          </button>
          <button
            type="button"
            data-view-target="overview"
            class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium"
          >
            Visao geral
          </button>
        </div>
      </section>

      <section data-view="activities" class="space-y-6">
        <section class="rounded-xl bg-white p-5 shadow">
          <h1 class="mb-4 text-2xl font-semibold">Gestao de atividades</h1>
          <form id="activityForm" class="grid gap-3 md:grid-cols-3">
            <input
              id="activityTitle"
              class="rounded-md border border-slate-300 px-3 py-2"
              placeholder="Titulo da atividade"
              required
            />
            <select id="activityType" class="rounded-md border border-slate-300 px-3 py-2">
              <option value="respiracao">Respiracao</option>
              <option value="meditacao">Meditacao</option>
              <option value="mindfulness">Mindfulness</option>
            </select>
            <button class="rounded-md bg-indigo-600 px-4 py-2 text-white" type="submit">Adicionar</button>
          </form>
        </section>

        <section class="rounded-xl bg-white p-5 shadow">
          <h2 class="mb-4 text-xl font-semibold">Atividades ativas</h2>
          <ul id="activityList" class="space-y-2 text-sm"></ul>
        </section>
      </section>

      <section data-view="overview" class="hidden rounded-xl bg-white p-5 shadow">
        <h2 class="mb-4 text-xl font-semibold">Visao geral</h2>
        <p class="text-sm text-slate-600">
          Esta view agrupa dados globais de administracao. Nesta fase mostra apenas o total de atividades.
        </p>
        <p class="mt-3 text-sm"><strong>Total de atividades:</strong> <span id="activityCount">0</span></p>
      </section>
    </main>

    <div id="feedbackModal" class="fixed inset-0 hidden bg-slate-900/40 p-4" aria-hidden="true">
      <div class="mx-auto mt-24 max-w-md rounded-xl bg-white p-5 shadow-lg">
        <h3 id="modalTitle" class="text-lg font-semibold text-slate-900"></h3>
        <p id="modalBody" class="mt-2 text-sm text-slate-800"></p>
        <button id="modalCloseBtn" type="button" class="mt-4 rounded-md bg-indigo-700 px-4 py-2 text-white">
          Fechar
        </button>
      </div>
    </div>

    <script type="module" src="src/js/entries/admin.js"></script>
  </body>
</html>
