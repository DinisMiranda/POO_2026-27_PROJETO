<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenify | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-800">
    <main class="mx-auto mt-16 max-w-md rounded-xl bg-white p-6 shadow">
      <h1 class="mb-1 text-2xl font-semibold">Entrar</h1>
      <p class="mb-5 text-sm text-slate-600">Acede a tua conta para entrar na tua area.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="mb-1 block text-sm font-medium" for="email">Email</label>
          <input id="email" name="email" type="email" required class="w-full rounded-md border border-slate-300 px-3 py-2" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2"
          />
        </div>
        <p id="loginError" class="hidden rounded bg-rose-50 p-2 text-sm text-rose-700"></p>
        <button class="w-full rounded-md bg-indigo-600 px-4 py-2 font-medium text-white" type="submit">Entrar</button>
      </form>

      <p class="mt-4 text-sm">
        Ainda nao tens conta?
        <a class="font-semibold text-indigo-700" href="register.html">Registar</a>
      </p>
    </main>

    <script src="src/js/auth.js"></script>
    <script src="src/js/login.js"></script>
  </body>
</html>
